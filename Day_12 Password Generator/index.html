<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Generator</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="container">
  <h2>🔐 Password Generator</h2>

  <div class="password-box">
    <input type="text" id="password" readonly>
    <button onclick="copyPassword()">📋</button>
  </div>

  <div class="setting">
    <label>Password Length</label>
    <input type="range" id="length" min="4" max="20" value="8" oninput="updateLength()">
    <span id="lengthValue">8</span>
  </div>

  <div class="options">
    <label><input type="checkbox" id="uppercase"> Uppercase</label>
    <label><input type="checkbox" id="lowercase" checked> Lowercase</label>
    <label><input type="checkbox" id="numbers"> Numbers</label>
    <label><input type="checkbox" id="symbols"> Symbols</label>
  </div>

  <button class="generate" onclick="generatePassword()">Generate Password</button>
</div>

<script src="./js/script.js"></script>
</body>
</html>
