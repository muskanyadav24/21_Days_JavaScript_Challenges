<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar | Day 3</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <nav class="navbar" id="navbar">
            <div class="container">
                <a href="#" class="logo">
                    <span class="logo-icon">▲</span>
                    <span class="logo-text">AETHER</span>
                </a>

                <ul class="nav-links" id="navLinks">
                    <li><a href="#home" class="nav-item">Home</a></li>
                    <li><a href="#about" class="nav-item">About</a></li>
                    <li><a href="#services" class="nav-item">Services</a></li>
                    <li><a href="#contact" class="nav-item">Contact</a></li>
                    <li><a href="#" class="btn-cta">Get Started</a></li>
                </ul>

                <button class="hamburger" id="hamburger" aria-label="Toggle Navigation">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </button>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero" id="home">
            <div class="hero-content">
                <h1>Modern Web Aesthetics</h1>
                <p>Experience the beauty of glassmorphism and seamless transitions in a fully responsive navigation system.</p>
                <div class="hero-btns">
                    <a href="#" class="btn-primary">Explore Now</a>
                    <a href="#" class="btn-secondary">Learn More</a>
                </div>
            </div>
        </section>

    <script src="./js/script.js"></script>
</body>
</html>
