<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 16 - Cart System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🛒 Shopping Cart System</h1>
            <div class="header-info">
                <span id="cartCount" class="cart-count">0</span>
                <span class="cart-label">Items</span>
            </div>
        </header>

        <main>
            <!-- Products Section -->
            <section class="products-section">
                <h2>Available Products</h2>
                <div class="products-grid" id="productsContainer">
                    <!-- Products will be inserted here by JavaScript -->
                </div>
            </section>

            <!-- Cart Section -->
            <section class="cart-section">
                <h2>Shopping Cart</h2>
                <div class="cart-container">
                    <div id="cartItems" class="cart-items">
                        <!-- Cart items will be inserted here by JavaScript -->
                    </div>
                    <div class="empty-cart" id="emptyCartMessage">
                        <p>Your cart is empty</p>
                    </div>
                </div>

                <!-- Cart Summary -->
                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">₹0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax (10%):</span>
                        <span id="tax">₹0.00</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="total">₹0.00</span>
                    </div>
                    <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
                    <button class="clear-btn" id="clearCartBtn">Clear Cart</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Product Description Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-body">
                <img class="modal-image" id="modalImage" src="" alt="Product image">
                <h2 id="modalTitle"></h2>
                <div class="modal-description" id="modalDescription"></div>
                <div class="modal-price">Price: <span id="modalPrice"></span></div>
                <div class="modal-buttons">
                    <button class="modal-btn confirm-btn" onclick="confirmAddToCart()">Add to Cart</button>
                    <button class="modal-btn cancel-btn" onclick="closeModal()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
