<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="container">
        <h1>Welcome</h1>
        <p class="subtitle">Create your account to get started</p>
        
        <form id="form">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email">
                <div class="error-msg" id="emailError"></div>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="At least 6 characters">
                <div class="error-msg" id="passwordError"></div>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat password">
                <div class="error-msg" id="confirmError"></div>
            </div>

            <button type="submit">Get Started</button>
        </form>

        <p class="footer-text">Already have an account? <a href="#">Login</a></p>
    </div>
    <script src="./js/script.js"></script>
</body>
</html>
